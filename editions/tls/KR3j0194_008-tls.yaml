body:
  text: 治天下治天下有四術一曰忠愛二曰無私三曰用賢四曰度量度量通則財足矣用賢則多功矣無私百智之宗也忠愛父母之行也奚以知其然父母之所畜子者非賢強也非聰明也非俊智也愛之憂之欲其賢己也人利之與我利之無擇也欲其賢己也人利之與我利之無擇也此父母所以畜子也然則愛天下欲其賢己也人利之與我利之無擇也則天下之畜亦然矣此堯之所以畜天下也有虞氏盛德見人有善如己有善見人有過如己有過天無私於物地無私於物襲此行者謂之天子誠愛天下者得賢奚以知其然也弱子有疾慈母之見秦醫也不爭禮貌在囹圄其走大吏也不愛資財視天下若子是故其見醫者不爭禮貌其奉養也不愛資財故文王之見太公望也一日五反桓公之奉管仲也列城有數此所以國甚僻小身至穢污而為正於天下也鄭簡公謂子產曰飲酒之不樂鐘鼓之不鳴寡人之任也國家之不乂朝廷之不治與諸侯交之不得志子之任也子無入寡人之樂寡人無入子之朝自是以來子產治鄭城門不閉國無盜賊道無餓人孔子曰若鄭簡公之好樂雖抱鐘而朝可也夫用賢身樂而名附事少而功多國治而能逸凡治之道莫如因智智之道莫如因賢譬之猶相馬而借伯樂也相玉而借猗頓也亦必不過矣今有人於此盡力以為舟濟大水而不用也盡力以為車行遠而不乘也則人必以為無慧今人盡力以學謀事則不借智處行則不因賢舍其學不用也此其無慧也有甚於舍舟而涉舍車而走者矣
