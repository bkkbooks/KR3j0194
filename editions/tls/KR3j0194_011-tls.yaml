body:
  text: 綽子堯養無告禹愛辜人湯武及禽獸此先王之所以安危而懷遠也聖人於大私之中也為無私其於大好惡之中也為無好惡舜曰南風之薰兮可以解吾民之慍兮舜不歌禽獸而歌民湯曰朕身有罪無及萬方萬方有罪朕身受之湯不私其身而私萬方文王曰茍有仁人何必周親文王不私其親而私萬國先王非無私也所私者與人不同也松柏之鼠不知堂密之有美樅
