body:
  text: 貴言範獻子游於河大夫皆在君曰孰知欒氏之子大夫莫答舟人清涓舍楫而答曰君奚問欒氏之子為君曰自吾亡欒氏也其老者未死而少者壯矣吾是以問之清涓曰君善修晉國之政內得大夫而外不失百姓雖欒氏之子其若君何君若不修晉國之政內不得大夫而外失百姓則舟中之人皆欒氏之子也君曰善哉言明日朝令賜舟人清涓田萬畝清涓辭君曰以此田也易彼言也子尚喪寡人猶得也古之貴言也若此臣天下一天下也一天下者令於天下則行禁焉則止桀紂令天下而不行禁焉而不止故不得臣也目之所美心以為不義弗敢視也口之所甘心以為不義弗敢食也耳之所樂心以為不義弗敢聽也身之所安心以為不義弗敢服也然則令於天下而行禁焉而止者心也故曰心者身之君也天子以天下受令於心心不當則天下禍諸侯以國受令於心心不當則國亡匹夫以身受令於心心不當則身為戮矣禍之始也易除其除之不可者避之及其成也欲除之不可欲避之不可治於神者其事少而功多幹霄之木始若蘗足易去也及其成達也百人用斧斤弗能僨也熛火始起易息也及其焚雲夢孟諸雖以天下之役抒江漢之水弗能救也夫禍之始也猶熛火蘗足也易止也及其措於大事雖孔子墨翟之賢弗能救也屋焚而人救之則知德之年老者使塗隙戒突終身無失火之患而不知德也入於囹圄解於患難者則三族德之教之以仁義慈悌則終身無患而莫之德夫禍亦有突賢者行天下而務塞之則天下無兵患矣而莫之知德也故曰聖人治於神愚人爭於明也天地之道莫見其所以長物而物長莫見其所以亡物而物亡聖人之道亦然其興福也人莫之見而福興矣其除禍也人莫之知而禍除矣故曰神人益天下以財為仁勞天下以力為義分天下以生為神修先王之術除禍難之本使天下丈夫耕而食婦人織而衣皆得戴其首父子相保此其分萬物以生益天下以財不可勝計也神也者萬物之始萬物之紀也
