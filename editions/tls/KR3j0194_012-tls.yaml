body:
  text: 處道孔子曰欲知則問欲能則學欲給則豫欲善則肄國亂則擇其邪人而去之則國治矣胸中亂則擇其邪欲而去之則德正矣天下非無盲者也美人之貴明目者眾也天下非無聾者也辨士之貴聰耳者眾也天下非無亂人也堯舜之貴可教者眾也孔子曰君者盂也民者水也盂方則水方盂圓則水圓上何好而民不從昔者勾踐好勇而民輕死靈王好細腰而民多餓夫死與餓民之所惡也君誠好之百姓自然而況仁義乎桀紂之有天下也四海之內皆亂而關龍逢王子比干不與焉而謂之皆亂其亂者眾也堯舜之有天下也四海之內皆治而丹朱商均不與焉而謂之皆治其治者眾也故曰君誠服之百姓自然卿大夫服之百姓若逸官長服之百姓若流夫民之可教者眾故曰猶水也德者天地萬物得也義者天地萬物宜也禮者天地萬物體也使天地萬物皆得其宜當其體者謂之大仁食所以為肥也壹飯而問人曰奚若則皆笑之夫治天下大事也今人皆壹飯而問奚若者也善人以治天地則可矣我奚為而人善仲尼曰得之身者得之民失之身者失之民不出於戶而知天下不下其堂而治四方知反之於己者也以是觀之治己則人治矣
