body:
  text: 勸學學不倦所以治己也教不厭所以治人也夫繭舍而不治則腐蠹而棄使女工繅之以為美錦大君服而朝之身者繭也舍而不治則知行腐蠹使賢者教之以為世士則天下諸侯莫敢不敬是故子路卞之野人子貢衛之賈人顏涿聚盜也顓孫師駔也孔子教之皆為顯士夫學譬之猶礪也昆吾之金而銖父之錫使干越之工鑄之以為劍而弗加砥礪則以刺不入以擊不斷磨之以礱礪加之以黃砥則其刺也無前其擊也無下自是觀之礪之與弗礪其相去遠矣今人皆知礪其劍而弗知礪其身夫學身之礪砥也夫子曰車唯恐地之不堅也舟唯恐水之不深也有其器則以人之難為易夫道以人之難為易也是故曾子曰父母愛之喜而不忘父母惡之懼而無咎然則愛與惡其於成孝無擇也史鰌曰君親而近之至敬以遜貌而疏之敬無怨然則親與疏其於成忠無擇也孔子曰自娛於檃括之中直己而不直人以善廢而不邑邑蘧伯玉之行也然則興與廢其於成善無擇也屈侯附曰賢者易知也觀其富之所分達之所進窮之所不取然則窮與達其於成賢無擇也是故愛惡親疏廢興窮達皆可以成義有其器也桓公之舉管仲穆公之舉百里比其德也此所以國甚僻小身至穢污而為政於天下也今非比志意也而比容貌非比德行也而論爵列亦可以卻敵服遠矣農夫比粟商賈比財烈士比義是故監門逆旅農夫陶人皆得與焉爵列私貴也德行公貴也奚以知其然也司城子罕遇乘封人而下其僕曰乘封人也奚為下之子罕曰古之所謂良人者良其行也貴人者貴其心也今天爵而人良其行而貴其心吾敢弗敬乎以是觀之古之所謂貴非爵列也所謂良非先故也人君貴於一國而不達於天下天子貴於一世而不達於後世惟德行與天地相弊也爵列者德行之舍也其所息也詩曰蔽芾甘棠勿翦勿敗召伯所憩仁者之所息人不敢敗也天子諸侯人之所以貴也桀紂處之則賤矣是故曰爵列非貴也今天下貴爵列而賤德行是貴甘堂而賤召伯也亦反矣夫德義也者視之弗見聽之弗聞天地以正萬物以遍無爵而貴不祿而尊也鹿馳走無顧六馬不能望其塵所以及者顧也土積成嶽則楩楠豫章生焉水積成川則吞舟之魚生焉夫學之積也亦有所生也未有不因學而鑒道不假學而光身者也
