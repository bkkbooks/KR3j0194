body:
  text: 仁意治水潦者禹也播五種者後稷也聽獄折衷者皋陶也舜無為也而天下以為父母愛天下莫甚焉天下之善者惟仁也夫喪其子者茍可以得之無擇人也仁者之於善也亦然是故堯舉舜於畎畝湯舉伊尹於雍人內舉不避親外舉不避讎仁者之於善也無擇也無惡也惟善之所在堯問於舜曰何事舜曰事天問何任曰任地問何務曰務人平地而注水水流濕均薪而施火火從燥召之類也是故堯為善而衆美至焉桀為非而衆惡至焉燭於玉燭飲於醴泉暢於永風春為青陽夏為朱明秋為白藏冬為玄英四時和正光照此之謂玉燭甘雨時降萬物以嘉高者不少下者不多此之謂醴泉其風春為發生夏為長嬴秋為方盛冬為安靜四氣和為通正此之謂永風舜南面而治天下天下太平燭於玉燭息於永風食於膏火飲於醴泉舜之行其猶河海乎千仞之溪亦滿焉螻蟻之穴亦滿焉由此觀之禹湯之功不足言也
