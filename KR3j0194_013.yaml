body:
  text: 神明仁義聖智參天地天若不覆民將何恃何望地若不載民將安居安行聖人若弗治民將安率安將是故天覆之地載之聖人治之聖人之身猶日也夫日圓尺光盈天地聖人之身小其所燭遠聖人正己而四方治矣上綱茍直百目皆開德行茍直群物皆正政也者正人者也身不正則人不從是故不言而信不怒而威不施而仁有諸心而彼正謂之至政今人曰天下亂矣難以為善此不然也夫飢者易食寒者易衣此亂而後易為德也
