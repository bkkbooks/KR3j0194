body:
  text: 廣澤校正原脫澤字據爾雅疏補因井中視星所視不過數星自丘上以視則見其始出又見其入非明益也勢使然也夫私心井中也公心丘上也故智載於私則所知少載於公則所知多矣何以知其然夫吳越之國以臣妾為殉中國聞而非之怒則以親戚殉一言夫智在公則愛吳越之臣妾在私則忘其親戚非智損也怒弇之也好亦然語曰莫知其子之惡也非智損也愛弇之也是故夫論貴賤辨是非者必且自公心言之自公心聽之而後可知也匹夫愛其宅不愛其鄰諸侯愛其國不愛其敵天子兼天下而愛之大也墨子貴兼孔子貴公皇子貴衷田子貴均列子貴虛料子貴別囿其學之相非也數世矣而已皆弇於私也天帝皇後闢公弘廓宏溥介純夏幠冢晊昄皆大也十有餘名而實一也若使兼公虛衷平易別囿一實也則無相非也贖人
