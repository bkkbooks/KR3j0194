body:
  text: 恕恕者以身為度者也己所不欲毋加諸人惡諸人則去諸己欲諸人則求諸己此恕也農夫之耨去害苗者也賢者之治去害義者也慮之無益於義而慮之此心之穢也道之無益於義而道之此言之穢也為之無益於義而為之此行之穢也慮中義則智為上言中義則言為師事中義則行為法射不善而欲教人人不學也行不修而欲談人人不聽也夫驥惟伯樂獨知之不害其為良馬也行亦然惟賢者獨知之不害其為善士也
