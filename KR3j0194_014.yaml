body:
  text: 散見諸書文匯輯天地四方曰宇往古來今曰宙日五色至陽之精象君德也五色照耀君乘土而王少昊金天氏邑於窮桑日五色互照窮桑使星司夜月司時猶使雞司晨也虹霓為析翳慧星為欃槍春為忠東方為春春動也是故鳥獸孕寧草木華生萬物咸遂忠之至也夏為樂南方為夏夏興也南任也是故萬物莫不任興蕃殖充盈樂之至也秋為禮西方為秋秋肅也萬物莫不肅敬禮之至也冬為信北方為冬冬終也北伏方也是故萬物至冬皆伏貴踐若一美惡不減信之至也晝動而夜息天之道也八極之內有君長者東西二萬八千里南北二萬六千里故曰天左舒而起牽牛地右闢而起畢昴八極為局凡水其方折者有玉其圓折者有珠清水有黃金龍淵有玉英朔方之寒冰厚六尺木皮三寸北極左右有不釋之冰寒凝冰裂地荊者非無東西也而謂之南其南者多也傅巖在北海之洲赤縣州者實為昆侖之墟其東則鹵水島山左右蓬萊玉紅之草生焉食其一實而醉臥三百歲而後寤泰山之中有神房阿閣帝王録燧人上觀辰星下察五木以為火燧人之世天下多水故教民以漁虙犧氏之世天下多獸故教民以獵伏羲始畫八卦列八節而化天下神農氏治天下欲雨則雨五日為行雨旬為穀雨旬五日為時雨正四時之制萬物咸利故謂之神神農氏夫負妻戴以治天下堯曰聯之比神農猶旦與昏也神農氏七十世有天下豈每世賢哉牧民易也子貢問孔子曰古者黃帝四面信乎孔子曰黃帝取合己者四人使治四方不謀而親不約而成大有成功此之謂四面也黃帝斬蚩尢於中冀四夷之民有貫胸者有深目者有長肱者黃帝之德嘗致之堯有建善之旌堯立誹謗之木堯南撫交址北懷幽都東西至日月之所出入有餘日而不足於治者恕也人之言君天下者瑤臺九纍而堯白屋黼衣九種而堯大布宮中三市而堯鶉居珍羞百種而堯糲飯菜粥騏驎青龍而堯素車玄駒舜兼愛百姓務利天下其田歷山也荷彼耒耜耕彼南畝與四海俱有其利其漁雷澤也旱則為耕者鑿瀆儉則為獵者表虎故有光若日月天下歸之若父母舜事親養老為天下法其遊也得六人曰雒陶方回續身伯陽東不識秦不空皆一國之賢者也舜一徙成邑再徙成都三徙成國其致四方之士堯聞其賢征之草茅之中與之語禮樂而不逆與之語政至簡而易行與之語道廣大而不窮於是妻之以媓媵之以蛾九子事之而托天下焉舜受天下顏色不變堯以天下與舜顏色不變知天下無能損益於己也務成昭之教舜曰避天下之逆從天下之順天下不足取也避天下之順從天下之逆天下不足失也舜云從道必吉反道必凶如影如響舜舉三後而四死除何為四死飢渴寒晦勤勞鬥爭古者龍門未闢呂梁未鑿河出於孟門之上大溢逆流無有邱陵高阜滅之名曰洪水禹於是疏河決江十年不窺其家手不爪脛不生毛生偏枯之病步不相過人曰禹步山行乘樏泥行乘蕝禹治水為喪法曰毀必杖哀必三年是則水不救也故使死於陵者葬於陵死於澤者葬於澤桐棺三寸制喪三日禹興利除害為萬民種也禹長頸烏喙面貌亦惡矣天下從而賢之者好學也湯問伊尹曰壽可為耶伊尹曰王欲之則可為弗欲則不可為也湯之德及鳥獸矣湯之救旱也乘素車白馬著布䒫身嬰白茅以身為牲禱於桑林之野當此時也弦歌鼓舞者禁之一作殷湯救旱一作布衣無著字按䒫與旆同武王伐紂魚辛諫曰歲在北方不北征武王不從武王親射惡來之口親斫殷紂之頸手污於血不溫而食當此之時猶猛獸者也武王已戰之後三革不纍五刃不砥牛馬放之歷山終身弗乘也昔者武王崩成王少周公旦踐東宮履乘石祀明堂假為天子七年昔周公反政孔子非之曰周公其不聖乎以天下讓不為兆人也人之欲見毛嬙西施美其面也夫黃帝堯舜湯武美者非其面也人之所欲觀焉其行也欲聞焉其言也而言之與行皆在詩書矣黃帝曰合宮有虞氏曰總章殷人曰陽館周人曰明堂此皆所以名休其善也欲觀黃帝之行於合宮觀堯舜之行於總章有虞氏身有南畝妻有桑田神農並耕而王所以勸耕也堯瘦舜墨禹脛不生毛文王至日昃不暇飲食故富有天下貴為天子矣昔者舜兩眸子是謂重明作事成法出言成章文王四乳是謂至仁夫堯舜所起至治也湯武所起至亂也問其成功孰治則堯舜治問其孰難則湯武難人戴冠躡履譽堯非桀敬士侮慢故敬侮之譽毀知非其取也昔夏桀之時至德滅而不揚帝道掩而不興容臺振而掩覆犬群而入泉彘銜藪而席隩美人婢首墨面而不容曼聲吞炭內閉而不歌飛鳥鎩翼走獸決蹄山無峻幹澤無佳水桀為璇室瑤臺象廊玉床權天下虐百姓於是湯以革車三百乘伐於南巢收之夏宮天下寧定百姓和輯昔者桀紂縱欲長樂以苦百姓珍怪遠味必南海之葷北海之鹽西海之菁東海之鯨此其禍天下亦厚矣六馬登糟邱方舟泛酒池伯夷叔齊飢死首陽無地故也桀放於歷山紂殺於鄗宮無道故也有道無地則餓有地無道則亡魯哀公問孔子曰魯有大忘徙而忘其妻有諸孔子曰此忘之小者也昔商紂有臣曰王子須務為諂使其君樂須臾之樂而忘終身之憂棄黎老之言而用姑息之謀孔子謂子夏曰商汝知君之為君乎子夏曰魚失水則死水失魚猶為水也孔子曰商汝知之矣費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今以一人之身憂世之不治而涕泣不禁是憂河水濁而以泣清之也人知用賢之利也不能得賢其何故也夫買馬不論足力而以白黑為儀必無走馬矣買玉不論美惡而以大小為儀必無良寶矣舉士不論才而以貴勢為儀則伊尹管仲不為臣矣有醫竘者秦之良醫也為宣王割痤為惠王治痔皆愈張子之背腫命竘治之謂竘曰背非吾背也任子制焉治之遂愈竘誠善治疾也張子委制焉夫身與國亦猶此也必有所委制然後治矣我得民而治則馬有紫燕蘭池馬有秀騏逢騩馬有騏驎徑駿夫馬者良工御之則和馴端正致遠道矣僕人御之則馳奔毀車矣民者譬之馬也堯舜御之則天下端正桀紂御之則天下奔於歷山車輕道近則鞭策不用鞭策之所用遠道重任也刑罰者民之鞭策也為刑者刑以輔教服不聽也陳本書鈔四十三止刑以輔教四字此據原本書鈔刑法部秦穆公明於聽獄斷刑之日揖士大夫曰寡人不敏教不至使民入於刑寡人與有戾焉二三子各據爾官無使民困於刑繆公非樂刑民不得已也此其所以善刑也夫知衆類知我則知人矣天雨雪楚莊王披裘當戶曰我猶寒彼百姓賓客甚矣乃遣使巡國中求百姓賓客之無居宿絶糧者賑之國人大悅悅尼而來遠先王豈無大鳥怪獸之物哉然而不私也徐偃王好怪沒深水而得怪魚入深山而得怪獸者多列於庭徐偃王有筋而無骨莒君好鬼巫而國亡天子忘民則滅諸侯忘民則亡娶同姓以妾為妻變太子專罪大夫擅立國絶鄰好則幽改衣服易禮刑則放好酒忘身障賢者死古有五王之相秦公身吳班孫尢夫人冉贊公子麋古者倕為規矩準繩使天下效焉造歷者羲和之子也造冶者蚩尢也造車者奚仲也昆吾作陶皋陶擇羝裘以御之蒲衣生八年舜讓以天下周王太子晉生八年而服師曠虎豹之駒未成文而有食牛之氣鴻鵠之鷇羽翼未全而有四海之心賢者之生亦然仲尼曰面貌不足觀也先祖天下不見稱也然而名顯天下聞於四方其惟學者乎家有千金之玉而不知猶之貧也良工治之則富弇一國身有至貴而不知猶之賤也聖人告之則貴最天下孔子曰誦詩讀書與古人居讀書誦詩與古人謀仲尼志意不立子路侍儀服不修公西華侍禮不習子貢侍辭不辨宰我侍亡忽古今顏回侍節小物冉伯牛侍曰吾以夫六子自厲也閔子騫肥子貢曰何肥也子騫曰吾出見其美車馬則欲之入聞先王之言則又思欲之兩心相與戰今先王之言勝故肥子夏曰君子漸於飢寒而志不僻誇於五兵而辭不懾臨大事不忘昔席之言仁則人親之義則人尊之智則人用之也樹蔥韭者擇之則蕃仁義亦不可不擇也惟善無基義乃繁滋敬災與凶禍乃不重草木無大小必待春而後生人待義而後成十萬之軍無將軍必大亂夫義萬事之將也國之所以立者義也人之所以生者亦義也衆以虧形為辱君子以虧義為辱賢者之於義曰貴乎義乎曰義是故堯以天下與舜曰富乎義乎曰義是故子罕以不受玉為寶曰生乎義乎曰義是故務光投水而殪三者人之所重而不足以易義義必利雖桀殺關龍逢紂殺王子比干猶謂義之必利也箕子胥餘漆體而為厲披發佯狂以此免也莒國有名焦原者廣數尋長五十步臨百仞之溪莒國莫敢近也有以勇見莒子者獨卻行齊踵焉莒國莫之敢近已獨齊踵焉所以服莒國也夫義之為焦原也亦高矣是故賢者之於義也必且齊踵焉此所以服一世也中黃伯曰余左執太行之獶而右搏雕虎惟象之未與吾心試焉有力者則又願為牛欲與象斗以自試今二三子以為義矣將惡乎試之夫貧窮太行之獶也疏賤者義之雕虎也而吾日遇之亦足以試矣人謂孟賁曰生乎勇乎曰勇貴乎勇乎曰勇富乎勇乎曰勇三者人之所難而皆不足以易勇此其所以能攝三軍服猛獸故也孟賁水行不避蛟龍陸行不避虎兕飛廉惡來力角犀兕勇搏熊犀也田成子問勇顏歜聚之答也不敬田子之僕填劍曰更言則生不更則死歜聚曰以死為有智今吾生是也是吾所以懼汝而反以懼我聖人畜仁而不主仁畜知而不主知畜勇而不主勇昔齊桓公脅於魯君而獻地百里句踐脅於會稽而身官之三年趙襄子脅於智伯而以顏為愧其卒桓公臣魯君句踐滅吳襄子以智伯為戮此謂勇而能怯者也湯復於湯邱文王幽於羑里武王羈於玉門越王役於會稽秦穆公敗於殽塞齊桓公遇賊晉文公出走故三王資於辱而五伯得於困也鮑叔為桓公祝曰使臣無忘在莒時管子無忘在魯時寧戚無忘車下時為令尹而不喜退耕而不憂此孫叔敖之德也孔子至於勝母暮矣而不宿過於盜泉渴矣而不飲惡其名也曾子每讀喪禮泣下沾襟魯人有孝者三為母北魯人稱之彼其鬥則害親不鬥則辱羸矣不若兩降之韓雉見申羊於魯有龍飲於沂韓雉曰吾聞之出見虎搏之見龍射之今弗射是不得行吾聞也遂射之荊莊王命養由基射蜻蛉王曰吾欲生得之養由基援弓射之拂左翼焉王大喜駙馬其為荊王使於巴見擔鴆者問之是何以曰所以鴆人也於是請買之金不足又益之車馬已得之盡注之於江公輸般為蒙天之階階成將以攻宋墨子聞之赴於楚行十日十夜而至於郢見般曰聞子為階將以攻宋宋何罪之有無罪而攻之不可謂仁胡不已也公輸般曰不可吾既以言之王矣墨子曰胡不見我於王公輸般曰諾墨子見楚王曰今有人於此舍其文軒鄰有敝輿而欲竊之舍其錦繡鄰有短褐而欲竊之舍其梁肉鄰有糟粳而欲竊之此為何若人王曰此為竊疾耳墨子曰荊之地方五千里宋之地方五百里此猶文軒之與敝輿也荊有雲夢犀兕麋鹿盈溢江漢之魚鱉黿鼉為天下饒宋所謂無雉兔鮒魚者也猶梁肉之與糟粳也荊有長松文梓楩楠豫章宋無長木此猶錦繡之與短褐也臣以王之攻宋也為與此同類王曰善哉請無攻宋齊有田果者命狗曰富命子為樂將欲祭也狗入室果呼之曰富出巫曰不祥也家果大禍長子死哭曰樂乎而不似悲也宋人有公斂皮者適市反呼曰公斂皮屠者遽收其皮夷逸者夷詭諸之裔或勸其仕曰吾譬則牛也寧服軛以耕於野不忍被繡入廟而為牲楚狂接輿耕於方城隱者西鄉曹曼邱氏北門子孔子曰詘寸而信尺小枉而大直吾為之也聖人權福則取重權禍則取輕君子量才而受爵量功而受祿能官者必稱事守道固窮則輕王公卑墻來盜榮辱由中出敬侮由外生言美則響美言惡則響惡身長則影長身短則影短名者響也行者影也是故慎而言將有和之慎而行將有隨之夫龍門魚之難也太行牛之難也以德報怨人之難也厚積不登高臺不處高室多陽大室多陰故皆不居天神曰靈地神曰祗人神曰鬼鬼者歸也故古者謂死人為歸人老萊子曰人生於天地之間寄也寄者固歸也其生也存其死也亡人生也亦少矣而歲往之亦速矣先王之祠禮也天子祭四極諸侯祭山川大夫祭五祀士祭其親也鐘鼓之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其意變其聲亦變意誠感之達於金石而況於人乎夫瑟二十五弦其僕人鼓之則為笑賢者以其義鼓之欲樂則樂欲悲則悲雖有暴君為之立變繞梁之鳴許史鼓之非不樂也墨子以為傷義故不聽也商容觀舞墨子吹笙墨子非樂而於樂有是也膳俞兒和之以薑桂為人主上食鴻鵠在上捍弓彀弩以待之若發若否問二五曰不知也非二五之難計也欲鴻之心亂之也文軒六駃題無四寸之鍵則車不行小亡則大者不成也水非石之鉆繩非木之鋸利錐不如方鑿水試斷鵠雁陸試斷牛馬所以觀良劍也昆吾之劍可以切玉玉者色不如雪澤不如雨潤不如膏光不如燭取玉甚難越三江五湖至昆侖之山千人往百人反百人往十人至中國覆十萬之師解三千之圍吉玉大龜玉淵之中驪龍蟠焉頷下有珠也程中國謂之豹越人謂之貘距虛不擇地而走見驥一毛不知其狀見畫一色不知其美屠者割肉則知牛長少弓人剺筋則知牛長少雕人裁骨則知牛長少各有辨焉使牛捕鼠不如貓狌之捷大牛為犉七尺大羊為羬六尺大豕為豟五尺五尺大犬為猶羊不任駕鹽車椽不可為楣棟戰如鬥雞勝者先鳴揚州之雞裸無毛雞司夜貍執鼠日燭人此皆不令自全卵生曰琢胎生曰乳地中有犬名曰地狼有人名曰無傷木之精氣為必方大木之奇靈者為若木食之人多為仁者名為若木春華秋英其名曰桂疓春秋隱公五年初獻六羽穀梁傳云初始也穀梁子曰舞夏天子八佾諸公六佾諸侯四佾初獻六羽始僭樂矣尸子曰舞夏自天子至諸侯皆用八佾初獻六羽始厲樂矣春秋桓公九年冬曹伯使其世子射姑來朝穀梁傳云朝不言使言使非正也使世子抗諸侯之禮而來朝曹伯失正矣諸侯相見曰朝以待人父之道待人之子以內為失正矣內失正曹伯失正世子可以已矣則是故命也尸子曰夫已多乎道
