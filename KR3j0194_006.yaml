body:
  text: 發蒙若夫名分聖瀟雨按原刻為繁體作聖之所審也造父之所以與交者少操轡馬之百節皆與明王之所以與臣下交者少審名分群臣莫敢不盡力竭智矣天下之可治分成也是非之可辨名定也無過其實罪也弗及愚也是故情盡而不僞質素而無巧故有道之君其無易聽此名分之所審也若夫臨官治事者案其法則民敬事任士進賢者保其後則民慎舉議國親事者盡其實則民敬言孔子曰臨事而懼希不濟易曰若履虎尾終之吉若群臣之衆皆戒慎恐懼若履虎尾則何不濟之有乎君明則臣少罪夫使衆者詔作則遲分地則速是何也無所逃其罪也言亦有地不可不分也君臣同地則臣有所逃其罪矣故陳繩則木之枉者有罪措準則地之險者有罪審名分則群臣之不審者有罪夫愛民且利之也愛而不利則非慈母之德也好士且知之也好而弗知則衆而無用也力於朝且治之也力而治則勞而無功矣三者雖異道一也是故曰審一之經百事乃成審一之紀百事乃理名實判為兩合為一是非隨名實賞罰隨是非是則有賞非則有罰人君之所獨斷也明君之立也正其貌莊其心虛其視不躁其聽不淫審分應辭以立於廷則隱匿疏遠雖有非焉必不多矣明君不用長耳目不行間諜不強聞見形至而觀聲至而聽事至而應近者不過則遠者治矣明者不失則微者敬矣家人子侄和臣妾力則家富丈人雖厚衣食無傷也子侄不和臣妾不力則家貧丈人雖薄衣食無益也而況於萬乘之君乎國之所以不治者三不知用賢此其一也雖知用賢求不能得此其二也雖得賢不能盡此其三也正名以御之則堯舜之智必盡矣明分以示之則桀紂之暴必止矣賢者盡暴者止則治民之道不可以加矣聽朝之道使人有分有大善者必問孰進之有大過者必云孰任之而行賞罰焉且以觀賢不肖也今有大善者不問孰進之有大過者不問孰任之則有分無益已問孰任之而不行賞罰則問之無益已是非不得盡見謂之蔽見而弗能知謂之虛知而弗能賞謂之縱三者亂之本也明分則不蔽正名則不虛賞賢罰暴則不縱三者治之道也於群臣之中賢則貴之不肖則賤之治則使之不治則之忠則愛之不忠則罪之賢不肖治不治忠不忠由是觀之猶白黑也陳繩而斫之則巧拙易知也夫觀群臣亦有繩以名引之則雖堯舜不服矣慮事而當不若進賢進賢而當不若知賢知賢又能用之備矣治天下之要在於正名正名去僞事成若化茍能正名天成地平為人臣者以進賢為功為人君者以用賢為功為人臣者進賢是自為置上也自為置上而無賞是故不為也進不肖者是自為置下也自為置下而無罪是故為之也使進賢者必有賞進不肖者必有罪無敢進也者為無能之人若此則必多進賢矣
