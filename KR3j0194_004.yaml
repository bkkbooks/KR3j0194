body:
  text: 明堂夫高顯尊貴利天下之徑也非仁者之所以輕也何以知其然耶日之能燭遠勢高也使日在井中則不能燭十步矣舜之方陶也不能利其巷下南面而君天下蠻夷戎狄皆被其福目在足下則不可以視矣天高明然後能燭臨萬物地廣大然後能載任群體其本不美則其枝葉莖心不得美矣此古今之大徑也是故聖王謹修其身以君天下則天道至焉地道稽焉萬物度焉古者明王之求賢也不避遠近不論貴賤卑爵以下賢輕身以先士故堯從舜於畎畝之中北面而見之不爭禮貌此先王之所以能正天地利萬物之故也今諸侯之君廣其土地之富而奮其兵革之強以驕士士亦務其德行美其道術以輕上此仁者之所非也曾子曰取人者必畏與人者必驕今說者懷畏而聽者懷驕以此行義不亦難乎非求賢務士而能致大名於天下者未之嘗聞也夫士不可妄致也覆巢破卵則鳳皇不至焉刳胎焚夭則麒麟不往焉竭澤漉魚則神龍不下焉夫禽獸之愚而不可妄致也而況於火食之民乎是故曰待士不敬舉士不信則善士不往焉聽言耳目不瞿視聽不深則善言不往焉孔子曰大哉河海乎下之也夫河下天下之川故廣人下天下之士故大故曰下士者得賢下敵者得友下眾者得譽故度於往古觀於先王非求賢務士而能立功於天下成名於後世者未之嘗有也夫求士不遵其道而能致士者未之嘗見也然則先王之道可知己務行之而已矣
