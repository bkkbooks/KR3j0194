front:
  text: 自序漢書藝文志雜家尸子二十篇隋唐志並同宋時全書已亡王應麟漢志考證云李淑書目存四卷館閣書目止存二篇合為一卷其本皆不傳近所傳者有震澤任氏本元和惠氏本陽湖孫氏本任本凡三篇曰仁意曰君治曰廣釋實皆攈托佚文傅會舊目繼培初讀其書就所攬掇表識出處糾拾遺謬是正文字後得惠孫之書以相比校頗復有所疑異乃集平昔疏記稍加釐訂以群書治要所載為上卷諸書稱引與之同者分注于下其不載治要而散見諸書者為下卷引用違錯及各本誤收者別為存疑附於後謹按劉向別録稱尸子書凡六萬餘言今茲撰録蓋十失八可為嘆息然由所概見推竟端委尚有可意會者張湛注列子其序云莊子慎到韓非尸子淮南玄示旨歸多稱其言今按歸人之説見天瑞篇言行響影之説見説符篇其所誦述定非數言淮南子墜形訓云水圓折者有珠方折者有玉清水有黃金龍淵有玉英又云北極有不釋之冰其説皆本尸子章懷太子注後漢書謂尸子書二十篇十九篇陳道德仁義之紀一篇言九州險阻水泉所起墜形之文當在此篇準是以求則墜形訓九山九塞九藪及水泉諸説必皆用尸子可知又因引贖人而知為子貢事引悅尼來遠而知為葉公問政引湯德及禽獸而知為解網觸類引伸課虛以責有是在好學者之深思矣劉向序荀子謂尸子著書非先王之法不循孔氏之術劉協又謂其兼總雜術術通而文鈍今原書散佚未究大恉諸家徵説率旨採擷精華翦落枝葉單詞剩誼轉可寶愛其書原本先民時有竊取後出諸子又或餐挹其中傳相蹈襲今輒刺取各書略明歸出欲以證釋同異史記孟荀列傳言楚有尸子集解引劉向別録云楚有尸子疑謂其在蜀今按尸子書晉人也名佼秦相衛鞅客也衛鞅商君謀事畫計立法理民未嘗不與佼規也商君被刑佼恐並誅乃亡逃入蜀漢志班固自注又以佼為魯人晉魯字形相近未能定其然否云嘉慶十有六年歲在重光協洽陽月月既望蕭山汪繼培識
