body:
  text: 四儀行有四儀一曰志動不忘仁二曰智用不忘義三曰力事不忘忠四曰口言不忘信慎守四儀以終其身名功之從之也猶形之有影聲之有響也是故志不忘仁則中能寬裕智不忘義則行有文理力不忘忠則動無廢功口不忘信則言若符節若中寬裕而行文理動有功而言可信也雖古之有厚功大名見於四海之外知於萬世之後者其行身也無以加於此矣
