body:
  text: 分天地生萬物聖人裁之裁物以制分便事以立官君臣父子上下長幼貴賤親疏皆得其分曰治愛得分曰仁施得分曰義慮得分曰智動得分曰適言得分曰信皆得其分而後為成人明王之治民也事少而功立身逸而國治言寡而令行事少而功多守要也身逸而國治用賢也言寡而令行正名也君人者茍能正名愚智盡情執一以靜令名自正令事自定賞罰隨名民莫不敬周公之治天下也酒肉不撤於前鐘鼓不解於懸聽樂而國治勞無事焉飲酒而賢舉智無事焉自為而民富仁無事焉知此道也者衆賢為役愚智盡情矣明王之道易行也勞不進一步聽獄不後皋陶食不損一味富民不後虞舜樂不損一日用兵不後湯武書之不盈尺簡南面而立一言而國治堯舜復生弗能更也身無變而治國無變而王湯武復生弗能更也執一之道去智與巧有虞之君天下也使天下貢善殷周之君天下也使天下貢才夫至衆賢而能用之此有虞之盛德也三人之所廢天下弗能興也三人之所興天下弗能廢也親曰不孝君曰不忠友曰不信天下弗能興也親言其孝君言其忠友言其信天下弗能廢也夫符節合之則是非自見行亦有符三者合則行自見矣此所以觀行也諸治官臨衆者上比度以觀其賢案法以觀其罪吏雖有邪僻無所逃之所以觀勝任也群臣之愚智日效於前擇其知事者而令之謀群臣之所舉日效於前擇其知人者而令之舉群臣之治亂日效於前擇其勝任者而令之治群臣之行可得而察也擇其賢者而舉之則民競於行勝任者治則百官不亂知人者舉則賢者不隱知事者謀則大舉不失夫弩機損若黍則不鉤益若則不發言者百事之機也聖王正言於朝而四方治矣是故曰正名去僞事成若化以實核名百事皆成夫用賢使能不勞而治正名覆實不罰而威達情見素則是非不蔽復本原始則言若符節良工之馬易御也聖王之民易治也其此之謂乎
